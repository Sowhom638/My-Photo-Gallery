<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background-color: #ffffff;
        }

        .header h1 {
            color: #4a4a4a;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1600/1000;
            background-color: #f0f0f0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
            border-radius: 50%;
        }

        .lightbox-nav:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.3s ease;
        }

        .lightbox-close:hover {
            transform: rotate(90deg);
        }

        .lightbox-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 1.1rem;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 5px;
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Photo Gallery</h1>
    </div>

    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Images will be inserted here by JavaScript -->
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
        <div class="lightbox-content">
            <img src="" alt="" class="lightbox-img" id="lightboxImg">
            <div class="lightbox-info" id="lightboxInfo"></div>
        </div>
    </div>

    <script>
        // Image data with 5 themes (4 images each = 20 total)
        const images = [
            // Theme 1: Nature/Landscape
            {
                src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&h=1000&fit=crop',
                theme: 'Nature',
                title: 'Mountain Landscape'
            },
            {
                src: 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1600&h=1000&fit=crop',
                theme: 'Nature',
                title: 'Waterfall'
            },
            {
                src: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1600&h=1000&fit=crop',
                theme: 'Nature',
                title: 'Lake View'
            },
            {
                src: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1600&h=1000&fit=crop',
                theme: 'Nature',
                title: 'Misty Forest'
            },
            
            // Theme 2: Architecture/City
            {
                src: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=1600&h=1000&fit=crop',
                theme: 'Architecture',
                title: 'City Skyline'
            },
            {
                src: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=1600&h=1000&fit=crop',
                theme: 'Architecture',
                title: 'New York City'
            },
            {
                src: 'https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1600&h=1000&fit=crop',
                theme: 'Architecture',
                title: 'Modern Building'
            },
            {
                src: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1600&h=1000&fit=crop',
                theme: 'Architecture',
                title: 'Urban Architecture'
            },
            
            // Theme 3: People/Portrait
            {
                src: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1600&h=1000&fit=crop',
                theme: 'People',
                title: 'Portrait Session'
            },
            {
                src: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=1600&h=1000&fit=crop',
                theme: 'People',
                title: 'Fashion Portrait'
            },
            {
                src: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=1600&h=1000&fit=crop',
                theme: 'People',
                title: 'Character Study'
            },
            {
                src: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1600&h=1000&fit=crop',
                theme: 'People',
                title: 'Lifestyle Portrait'
            },
            
            // Theme 4: Animals/Wildlife
            {
                src: 'https://images.unsplash.com/photo-1535083783855-76ae62b2914e?w=1600&h=1000&fit=crop',
                theme: 'Animals',
                title: 'Wildlife'
            },
            {
                src: 'https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=1600&h=1000&fit=crop',
                theme: 'Animals',
                title: 'Lion Portrait'
            },
            {
                src: 'https://images.unsplash.com/photo-1456926631375-92c8ce872def?w=1600&h=1000&fit=crop',
                theme: 'Animals',
                title: 'Leopard'
            },
            {
                src: 'https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=1600&h=1000&fit=crop',
                theme: 'Animals',
                title: 'Bird in Nature'
            },
            
            // Theme 5: Food/Culinary
            {
                src: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1600&h=1000&fit=crop',
                theme: 'Food',
                title: 'Gourmet Dish'
            },
            {
                src: 'https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?w=1600&h=1000&fit=crop',
                theme: 'Food',
                title: 'Food Plating'
            },
            {
                src: 'https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=1600&h=1000&fit=crop',
                theme: 'Food',
                title: 'Breakfast Spread'
            },
            {
                src: 'https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=1600&h=1000&fit=crop',
                theme: 'Food',
                title: 'Pasta Dish'
            }
        ];

        let currentIndex = 0;
        const galleryGrid = document.getElementById('galleryGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxInfo = document.getElementById('lightboxInfo');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');

        // Create gallery items
        images.forEach((image, index) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="${image.src}" alt="${image.title}" loading="lazy">`;
            item.addEventListener('click', () => openLightbox(index));
            galleryGrid.appendChild(item);
        });

        // Open lightbox
        function openLightbox(index) {
            currentIndex = index;
            updateLightboxImage();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close lightbox
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Update lightbox image
        function updateLightboxImage() {
            const image = images[currentIndex];
            lightboxImg.src = image.src;
            lightboxImg.alt = image.title;
            lightboxInfo.textContent = `${image.title} - ${image.theme} (${currentIndex + 1} of ${images.length})`;
        }

        // Navigate to previous image
        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateLightboxImage();
        }

        // Navigate to next image
        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateLightboxImage();
        }

        // Event listeners
        lightboxClose.addEventListener('click', closeLightbox);
        lightboxPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            prevImage();
        });
        lightboxNext.addEventListener('click', (e) => {
            e.stopPropagation();
            nextImage();
        });

        // Close on background click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });

        // Prevent arrow keys from scrolling when lightbox is open
        window.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('active') && 
                (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
